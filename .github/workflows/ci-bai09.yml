name: CI Bai 09 - Logging

on:
  push:
    branches: [ "main" ]
    paths: [ 'Bai09/**' ]
  pull_request:
    branches: [ "main" ]
    paths: [ 'Bai09/**' ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Run Tests and Verify Logging
      working-directory: ./Bai09
      # Chạy test để in ra các dòng log (cả INFO và ERROR)
      run: mvn clean test