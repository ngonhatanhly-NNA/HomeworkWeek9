name: CI Bai 06 - Maven Caching

on:
  push:
    branches: [ "main" ]
    paths: [ 'Bai06/**' ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        # ĐÂY LÀ ĐIỂM CỐT LÕI CỦA BÀI 6: Khai báo cache maven
        cache: 'maven' 

    - name: Build with Maven
      working-directory: ./Bai06
      run: mvn clean compile